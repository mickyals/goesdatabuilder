# CONFIG FOR GOESMULTICLOUD AND THE REGRIDDER

data_access:
  # Source data location
  file_dir: "${GOES_DATA}/GOES18/2024"
  recursive: true  # Search subdirectories


  # Chunk configuration for Dask
  chunk_size:
    time: 1       # One timestep per chunk (streaming)
    y: -1         # Full spatial extent (required for regridding)
    x: -1         # Full spatial extent (required for regridding)

  # Validation
  sample_size: 5  # Number of files to validate on init
  sampling_type: 'even' # or random, if random specify seed
  #seed: 1234

  # xarray
  engine: netcdf4  # xarray backend
  parallel: False  # If True, the open and preprocess steps of this function will be performed in parallel using dask.delayed. Default is False.

regridding:
  # Cached weights location
  weights_dir: ${WEIGHTS_PATH}/GOES-East/
  load_cached: true
  reference_band: 7  # Band used to compute weights (shortwave window)
  decimals:  6 # Number of decimal places to round to (default: 4). If decimals is negative, it specifies the number of positions to the left of the decimal point.

  # Target grid specification
  target:
    resolution: 0.02  # Degrees (default approach)
    # OR explicit bounds (optional, overrides resolution):
    # lat_min: -60.0
    # lat_max: 60.0
    # lon_min: -150.0
    # lon_max: -30.0
    # lat_resolution: 0.02
    # lon_resolution: 0.02
