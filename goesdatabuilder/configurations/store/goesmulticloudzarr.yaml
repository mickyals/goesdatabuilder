store:
  type: local
  path: null

zarr:
  zarr_format: 3

  compression:
    default:
      compressor:
        codec: blosc
        cname: zstd
        clevel: 5
        shuffle: bitshuffle
      serializer:
        codec: null
        cname: null
      filter:
        codec: null
        cname: null
      chunks: auto
      shards: null
      fill_value: NaN

    secondary:
      compressor:
        codec: blosc
        cname: zstd
        clevel: 5
        shuffle: bitshuffle
      serializer:
        codec: null
        cname: null
      filter:
        codec: null
        cname: null
      chunks: auto
      fill_value: NaN

goes:
  platforms: ["GOES-East", "GOES-West", "GOES-Test"]
  bands: [8, 13, 15]
  spatial_resolution: "2km"

  # Global metadata following ACDD (Attribute Convention for Data Discovery)
  global_metadata:
    Conventions: "CF-1.13, ACDD-1.3"
    title: "GOES ABI L2+ Cloud and Moisture Imagery"
    summary: "Regridded GOES ABI imagery on regular lat/lon grid using Delaunay triangulation"
    institution: "University of Toronto"
    source: "GOES-R Series Advanced Baseline Imager"
    processing_level: "L2+"

    # Creator info
    creator_name: "Marble Platform"
    creator_type: "institution"
    creator_email: null
    creator_url: null

    # Project info
    project: null
    program: null

    # Publisher info (optional)
    publisher_name: null
    publisher_email: null
    publisher_url: null

    # Contributor info (optional)
    contributor_name: null
    contributor_role: null

    # References and documentation
    references: "https://www.goes-r.gov/products/baseline-cloud-moisture-imagery.html"
    comment: "Regridded from native geostationary projection to geographic lat/lon using barycentric interpolation"
    acknowledgement: null

    # License and usage
    license: "CC BY 4.0"
    standard_name_vocabulary: "CF Standard Name Table v92"
    keywords: "GOES, ABI, satellite, imagery, regridded, lat-lon"
    keywords_vocabulary: "GCMD Science Keywords"

    # Temporal coverage (filled at runtime)
    time_coverage_start: null
    time_coverage_end: null
    time_coverage_duration: null
    time_coverage_resolution: null

    # Geospatial coverage (filled at runtime per region)
    geospatial_lat_min: null
    geospatial_lat_max: null
    geospatial_lon_min: null
    geospatial_lon_max: null
    geospatial_lat_units: "degrees_north"
    geospatial_lon_units: "degrees_east"
    geospatial_lat_resolution: null
    geospatial_lon_resolution: null
    geospatial_vertical_min: null
    geospatial_vertical_max: null

    # Metadata about metadata
    metadata_link: null
    date_metadata_modified: null

  # Regridding configuration
  regridding:
    method: "barycentric"
    triangulation: "delaunay"
    direct_hit_threshold: 0.999
    dqf_interpolated_flag: 5
    weights_cache_dir: "./regrid_weights/"
    save_weights: true
    validate_coverage: true
    min_coverage_fraction: 0.5

  # Processing metadata
  processing:
    software_name: "geolab"
    software_version: "0.1.0"
    software_url: "https://github.com/yourusername/geolab"
    processing_date: null  # filled at runtime
    processing_environment: "Python 3.11, PyTorch 2.1"

    # Quality control
    qc_enabled: true
    qc_flags:
      check_temporal_continuity: true
      check_spatial_coverage: true
      check_value_ranges: true
      max_missing_fraction: 0.1

    # Provenance chain
    source_file_pattern: "OR_ABI-L2-CMIPF-*.nc"
    source_data_url: null
    derived_from: []  # list of source file paths/URIs

  # Target grid specifications (per region, can override)
  target_grids:
    GOES-East:
      lat_min: -81.3282
      lat_max: 81.3282
      lat_resolution: 0.02  # degrees
      lon_min: -135.0
      lon_max: -15.0
      lon_resolution: 0.02
      crs: "EPSG:4326"

    GOES-West:
      lat_min: -81.3282
      lat_max: 81.3282
      lat_resolution: 0.02
      lon_min: 165.0
      lon_max: -115.0
      lon_resolution: 0.02
      crs: "EPSG:4326"

    GOES-Test:
      lat_min: -81.3282
      lat_max: 81.3282
      lat_resolution: 0.02
      lon_min: -75.0
      lon_max: 5.0
      lon_resolution: 0.02
      crs: "EPSG:4326"

  # Band metadata with products

  band_metadata:
    1:
      wavelength: 0.47
      long_name: "ABI Cloud and Moisture Imagery reflectance factor"
      description: "Blue band reflectance factor"
      standard_name: "toa_bidirectional_reflectance"
      units: "1"
      valid_range: [ 0.0, 1.0 ]
      products:
        - "Aerosol detection"
        - "Aerosol optical depth"
        - "Clear-sky masks"
        - "Cloud and moisture imagery"
        - "Cloud optical depth"
        - "Cloud particle size distribution"
        - "Downward solar insolation surface"
        - "Reflected solar insolation TOA"
        - "Snow cover"
        - "Radiances"

    2:
