store:
  type: local
  path: null


zarr:
  zarr_format: 3

  compression:
    default:
      compressor:
        codec: blosc # compressor to use
        cname: zstd
        clevel: 5
        shuffle: bitshuffle

      serializer:
        codec: null
        cname: null

      filter:
        codec: null
        cname: null

      chunks: auto # auto | null | [256, 256]
      shards: null # must be a multiple of chunk
      fill_value: NaN

    secondary:
      compressor:
        codec: blosc
        cname: zstd
        clevel: 5
        shuffle: bitshuffle  # noshuffle | shuffle | bitshuffle

      serializer:
        codec: null
        cname: null

      filter:
        codec: null
        cname: null

      chunks: auto # auto | null | [256, 256]
      fill_value: NaN

  configurations: #check https://zarr.readthedocs.io/en/stable/user-guide/config/
    async.concurrency: 10 #default is 10
    async.timeout: null

    default_zarr_version: 3

    array.order: 'F' Fortran or C
    array.target_shard_size_bytes': null
    array.write_empty_chunks': False

    enable_gpu: True

    threading.max_workers: True


# dataset specific section - this is an example.
goes:
  platforms: ["GOES-East", "GOES-West"]
  bands: [ "CMI_C08", "CMI_C13", "CMI_C15" ]
  spatial_resolution: 2km

  global_metadata: # Attribute Conventions for Data Discovery
    creator: null # e.g Marble Team
    conventions: CF-1.13



